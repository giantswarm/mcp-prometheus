# Default values for mcp-prometheus
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  registry: gsoci.azurecr.io
  repository: giantswarm/mcp-prometheus
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  fsGroup: 1000

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: mcp-prometheus.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: mcp-prometheus-tls
  #    hosts:
  #      - mcp-prometheus.local

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# MCP-specific health probes that test actual MCP functionality
livenessProbe: {}

readinessProbe: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes:
  - name: tmp
    emptyDir: {}

# Additional volumeMounts on the output Deployment definition.
volumeMounts:
  - name: tmp
    mountPath: /tmp

ciliumNetworkPolicy:
  enabled: true

# Monitoring configuration
monitoring:
  # Enable the observability HTTP server (/metrics, /healthz, /readyz),
  # the Service metrics port, and the ServiceMonitor.
  enabled: true
  serviceMonitor:
    # Create a ServiceMonitor for Prometheus Operator auto-discovery.
    # Requires monitoring.enabled and the Prometheus Operator CRDs to be installed.
    enabled: false
    # interval: 30s
    # scrapeTimeout: 10s
    # Additional labels to add to the ServiceMonitor (e.g. to match a Prometheus selector).
    labels: {}

nodeSelector: {}

tolerations: []

affinity: {}

# Application specific configuration
app:
  # Server configuration
  server:
    # Transport type: stdio, sse, or streamable-http
    transport: "streamable-http"
    # HTTP server address (for sse and streamable-http transports)
    httpAddr: ":8080"
    # SSE endpoint path (for sse transport)
    sseEndpoint: "/sse"
    # Message endpoint path (for sse transport)
    messageEndpoint: "/message"
    # HTTP endpoint path (for streamable-http transport)
    httpEndpoint: "/mcp"
    # Enable debug logging
    debug: false
    # Address for the observability HTTP server (/metrics, /healthz, /readyz).
    metricsAddr: ":9091"

  # OAuth 2.1 configuration (requires --enable-oauth flag and sse/streamable-http transport)
  oauth:
    # Enable OAuth 2.1 authentication via Dex OIDC
    enabled: false

    # Reference an existing Secret instead of creating one.
    # When set, app.oauth.dexClientSecret and app.oauth.encryptionKey are ignored.
    # The Secret must contain the keys: DEX_CLIENT_SECRET, MCP_OAUTH_ENCRYPTION_KEY
    # and optionally VALKEY_PASSWORD.
    existingSecret: ""

    # Dex OAuth client secret (stored in a K8s Secret)
    dexClientSecret: ""

    # AES-256-GCM encryption key for token storage (hex-encoded 32 bytes).
    # Generate with: openssl rand -hex 32
    encryptionKey: ""

    # Allow unauthenticated dynamic client registration (RFC 7591).
    # Set to true for MCP Inspector / local development only.
    # MUST remain false in production.
    allowPublicRegistration: false

    # Token storage backend
    storage:
      # "memory" (default, no persistence) or "valkey"
      type: memory
      valkey:
        url: ""
        password: ""
        tlsEnabled: false
        keyPrefix: "mcp-prometheus:"

  # Tenancy resolution configuration (only relevant when app.oauth.enabled: true).
  tenancy:
    # Resolution mode.
    #   grafana-organization — read GrafanaOrganization CRDs from Kubernetes (default).
    #   static               — fixed tenant list or group→tenants map from config.
    mode: "grafana-organization"

    static:
      # Comma-separated Mimir tenant IDs returned for all authenticated users.
      # Used when mode is "static" and groups is empty.
      tenants: ""

      # Map of Dex group name → list of Mimir tenant IDs.
      # When non-empty, takes precedence over tenants and resolves per-user.
      # Example:
      #   groups:
      #     team-ops:
      #       - prod-eu
      #       - prod-us
      #     team-dev:
      #       - staging
      groups: {}

  # Environment variables for Prometheus configuration
  # These can be used to provide default Prometheus settings
  env: []
    # - name: PROMETHEUS_URL
    #   value: "http://prometheus:9090"
    # - name: PROMETHEUS_ORGID
    #   value: "default"
    # - name: PROMETHEUS_USERNAME
    #   valueFrom:
    #     secretKeyRef:
    #       name: prometheus-auth
    #       key: username
    # - name: PROMETHEUS_PASSWORD
    #   valueFrom:
    #     secretKeyRef:
    #       name: prometheus-auth
    #       key: password
    # - name: PROMETHEUS_TOKEN
    #   valueFrom:
    #     secretKeyRef:
    #       name: prometheus-auth
    #       key: token
    # TLS configuration
    # - name: PROMETHEUS_TLS_SKIP_VERIFY
    #   value: "true"
    # - name: PROMETHEUS_TLS_CA_CERT
    #   value: "/etc/ssl/certs/ca.pem"
    # OpenTelemetry tracing (no-op by default)
    # - name: OTEL_EXPORTER_OTLP_ENDPOINT
    #   value: "http://otel-collector:4318"
    # - name: OTEL_SERVICE_NAME
    #   value: "mcp-prometheus"
    # OAuth non-secret env vars (when app.oauth.enabled: true)
    # - name: MCP_OAUTH_ISSUER
    #   value: "https://mcp-prometheus.example.com"
    # - name: OAUTH_STORAGE
    #   value: "memory"
    # - name: DEX_ISSUER_URL
    #   value: "https://dex.example.com"
    # - name: DEX_CLIENT_ID
    #   value: "mcp-prometheus"
    # - name: DEX_REDIRECT_URL
    #   value: "https://mcp-prometheus.example.com/oauth/callback"

# Gateway API HTTPRoute configuration.
# Use this instead of (or alongside) ingress when your cluster uses
# the Kubernetes Gateway API (e.g. Envoy Gateway, Istio, Cilium).
gatewayAPI:
  enabled: false
  httpRoute:
    # parentRefs is required when gatewayAPI.enabled is true.
    # Example:
    #   parentRefs:
    #     - name: my-gateway
    #       namespace: gateway-system
    parentRefs: []

    # Optional hostnames to restrict which hosts this route accepts.
    hostnames: []

    # Additional labels for the HTTPRoute resource.
    labels: {}

    # Additional annotations for the HTTPRoute resource.
    annotations: {}

    # Custom routing rules. If empty, a default rule forwarding all
    # traffic (PathPrefix: /) to the MCP service is created.
    # Example — separate MCP and OAuth paths:
    #   rules:
    #     - matches:
    #         - path:
    #             type: PathPrefix
    #             value: /
    rules: []
