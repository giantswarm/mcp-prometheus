apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-prometheus.fullname" . }}
  labels:
    {{- include "mcp-prometheus.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "mcp-prometheus.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "mcp-prometheus.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "mcp-prometheus.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "mcp-prometheus.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /mcp-prometheus
          args:
            - serve
            - --transport={{ .Values.app.server.transport }}
            - --http-addr={{ .Values.app.server.httpAddr }}
            - --sse-endpoint={{ .Values.app.server.sseEndpoint }}
            - --message-endpoint={{ .Values.app.server.messageEndpoint }}
            - --http-endpoint={{ .Values.app.server.httpEndpoint }}
            {{- if .Values.app.server.debug }}
            - --debug
            {{- end }}
            - --metrics-addr={{ if .Values.monitoring.enabled }}{{ .Values.app.server.metricsAddr }}{{ end }}
            {{- if .Values.app.oauth.enabled }}
            - --enable-oauth
            - --tenancy-mode={{ .Values.app.tenancy.mode | default "grafana-organization" }}
            {{- if .Values.app.tenancy.static.tenants }}
            - --static-tenants={{ .Values.app.tenancy.static.tenants }}
            {{- end }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            {{- if .Values.monitoring.enabled }}
            - name: metrics
              containerPort: {{ regexFind "[0-9]+$" .Values.app.server.metricsAddr | int }}
              protocol: TCP
            {{- end }}
          {{- if .Values.monitoring.enabled }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds | default 10 }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds | default 30 }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold | default 3 }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold | default 3 }}
          {{- else }}
          {{- if and .Values.livenessProbe (not (empty .Values.livenessProbe)) }}
          {{- if ne .Values.app.server.transport "stdio" }}
          livenessProbe:
            {{- if eq .Values.app.server.transport "streamable-http" }}
            httpGet:
              path: {{ .Values.app.server.httpEndpoint }}
              port: http
              httpHeaders:
                - name: Content-Type
                  value: application/json
            {{- else if eq .Values.app.server.transport "sse" }}
            httpGet:
              path: {{ .Values.app.server.sseEndpoint }}
              port: http
            {{- end }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds | default 10 }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds | default 30 }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold | default 3 }}
          {{- end }}
          {{- end }}
          {{- if and .Values.readinessProbe (not (empty .Values.readinessProbe)) }}
          {{- if ne .Values.app.server.transport "stdio" }}
          readinessProbe:
            {{- if eq .Values.app.server.transport "streamable-http" }}
            httpGet:
              path: {{ .Values.app.server.httpEndpoint }}
              port: http
              httpHeaders:
                - name: Content-Type
                  value: application/json
            {{- else if eq .Values.app.server.transport "sse" }}
            httpGet:
              path: {{ .Values.app.server.sseEndpoint }}
              port: http
            {{- end }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold | default 3 }}
          {{- end }}
          {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- $hasDexCA := and .Values.app.oauth.enabled .Values.app.oauth.dexCASecret.name }}
          {{- if or .Values.volumeMounts $hasDexCA }}
          volumeMounts:
            {{- if $hasDexCA }}
            - name: dex-ca
              mountPath: /etc/ssl/certs/dex-ca
              readOnly: true
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- $hasStaticGroupMap := and .Values.app.oauth.enabled (not (empty .Values.app.tenancy.static.groups)) }}
          {{- if or .Values.app.env .Values.app.oauth.enabled $hasStaticGroupMap }}
          env:
            {{- if .Values.app.oauth.enabled }}
            - name: MCP_OAUTH_ALLOW_PUBLIC_REGISTRATION
              value: {{ .Values.app.oauth.allowPublicRegistration | quote }}
            - name: MCP_OAUTH_ALLOW_PRIVATE_URLS
              value: {{ .Values.app.oauth.allowPrivateURLs | quote }}
            {{- if .Values.app.oauth.trustedAudiences }}
            - name: OAUTH_TRUSTED_AUDIENCES
              value: {{ .Values.app.oauth.trustedAudiences | join "," | quote }}
            {{- end }}
            {{- if .Values.app.oauth.trustedIssuers }}
            - name: OAUTH_TRUSTED_ISSUERS
              value: {{ .Values.app.oauth.trustedIssuers | toJson | quote }}
            {{- end }}
            {{- if .Values.app.oauth.dexCASecret.name }}
            - name: DEX_CA_FILE
              value: "/etc/ssl/certs/dex-ca/{{ .Values.app.oauth.dexCASecret.key | default "ca.crt" }}"
            {{- end }}
            {{- end }}
            {{- if $hasStaticGroupMap }}
            - name: TENANCY_STATIC_GROUP_MAP
              value: {{ .Values.app.tenancy.static.groups | toJson | quote }}
            {{- end }}
            {{- if .Values.app.env }}
            {{- toYaml .Values.app.env | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if .Values.app.oauth.enabled }}
          envFrom:
            - secretRef:
                name: {{ .Values.app.oauth.existingSecret | default (printf "%s-oauth" (include "mcp-prometheus.fullname" .)) }}
          {{- end }}
      {{- $hasDexCA := and .Values.app.oauth.enabled .Values.app.oauth.dexCASecret.name }}
      {{- if or .Values.volumes $hasDexCA }}
      volumes:
        {{- if $hasDexCA }}
        - name: dex-ca
          secret:
            secretName: {{ .Values.app.oauth.dexCASecret.name }}
            items:
              - key: {{ .Values.app.oauth.dexCASecret.key | default "ca.crt" }}
                path: {{ .Values.app.oauth.dexCASecret.key | default "ca.crt" }}
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
