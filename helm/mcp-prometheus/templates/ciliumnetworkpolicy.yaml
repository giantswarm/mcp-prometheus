{{- if .Values.ciliumNetworkPolicy.enabled }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "mcp-prometheus.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mcp-prometheus.labels" . | nindent 4 }}
    {{- with .Values.ciliumNetworkPolicy.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.ciliumNetworkPolicy.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  egress:
  - toEntities:
    - cluster
  {{- if .Values.app.oauth.enabled }}
  - toEntities:
    - world
  {{- end }}
  ingress:
  - fromEntities:
    - cluster
  endpointSelector:
    matchLabels:
      {{- include "mcp-prometheus.selectorLabels" . | nindent 6 }}
{{- end }}
