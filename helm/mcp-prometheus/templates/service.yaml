apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-prometheus.fullname" . }}
  labels:
    {{- include "mcp-prometheus.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.monitoring.enabled }}
    - port: {{ regexFind "[0-9]+$" .Values.app.server.metricsAddr | int }}
      targetPort: metrics
      protocol: TCP
      name: metrics
    {{- end }}
  selector:
    {{- include "mcp-prometheus.selectorLabels" . | nindent 4 }}
