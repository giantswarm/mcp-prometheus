---
# yamllint disable rule:truthy
name: CI Checks

on:
  pull_request:
    branches:
      - main
  push:  # Also run on pushes to main to catch direct commits
    branches:
      - main

jobs:
  check:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26'  # Match the version used in auto-release
          cache: true  # Cache Go modules and build cache

      - name: Install Python for yamllint
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: pip install yamllint

      - name: Run Checks (Lint & Test)
        run: make check

      - name: Install git-cliff
        if: github.event_name == 'pull_request'
        uses: giantswarm/install-binary-action@5bef88f65012037dd836117c8d344b21bb559854  # v4.1.0
        with:
          binary: git-cliff
          version: "2.13.1"
          # yamllint disable-line rule:line-length
          download_url: 'https://github.com/orhun/git-cliff/releases/download/v${version}/git-cliff-${version}-x86_64-unknown-linux-gnu.tar.gz'
          tarball_binary_path: 'git-cliff-${version}/git-cliff'
          smoke_test: '${binary} --version'

      - name: Validate cliff.toml
        if: github.event_name == 'pull_request'
        run: git-cliff --unreleased --bump --context
